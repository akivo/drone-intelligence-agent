version: '3.8'

services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: dronedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/dronedb
    # AirSim runs on the host — use host networking on Linux or host.docker.internal on Mac/Windows
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
